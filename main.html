        "langLabel": {"中文": "🌐 語言：", "韓文": "🌐 언어：", "日文": "🌐 言語：", "英文": "🌐 Language:"},
        "sheetLabel": {"中文": "📅 選擇要納入統計的資料範圍 (預設全選)：", "韓文": "📅 통계에 포함할 데이터 범위 선택 (기본값: 전체 선택)：", "日文": "📅 統計に含めるデータ範囲を選択（デフォルト：すべて選択）：", "英文": "📅 Select data range for statistics (Default: Select All):"},
        "defaultOption": {"中文": "--請選擇Ban位--", "韓文": "--밴 선택--", "日文": "--BANを選択--", "英文": "--Select Ban--"},
        "mapOptional": {"中文": "（選填）不限地圖", "韓文": "（선택）맵 무관", "日文": "（任意）マップ指定なし", "英文": "(Optional) Any Map"},
        "noData": {"中文": "找不到符合的資料。", "韓文": "일치하는 데이터가 없습니다.", "日文": "一致するデータが見つかりません。", "英文": "No matching data found."},
        "predictionTitle": {"中文": "監管者出現機率預測：", "韓文": "헌터 출현 확률 예측：", "日文": "ハンター出現確率予測：", "英文": "Hunter Appearance Probability Prediction:"},
        "copySuccess": {"中文": "已複製預測結果到剪貼簿 ✅", "韓文": "결과가 클립보드에 복사되었습니다 ✅", "日文": "結果がクリップボードにコピーされました ✅", "英文": "Prediction copied to clipboard ✅"},
        "playerTitle": {"中文": "可能遇到的玩家", "韓文": "만날 수 있는 플레이어", "日文": "遭遇する可能性のあるプレイヤー", "英文": "Potential Players"},
        "thPlayer": {"中文": "玩家名稱", "韓文": "플레이어명", "日文": "プレイヤー名", "英文": "Player Name"},
        "thHunter": {"中文": "使用監管者", "韓文": "사용 헌터", "日文": "使用ハンター", "英文": "Hunter"},
        "thMap": {"中文": "地圖", "韓文": "맵", "日文": "マップ", "英文": "Map"},
        "thCombo": {"中文": "Ban 組合", "韓文": "밴 조합", "日文": "BAN組み合わせ", "英文": "Ban Combo"},
        "thSource": {"中文": "資料來源", "韓文": "데이터 출처", "日文": "データ소스", "英文": "Source"}
    };

    // --- 全局變數 ---
    const allSurvivors = ["幸運兒", "醫生", "律師", "慈善家", "園丁", "魔術師", "冒險家", "傭兵", "空軍", "機械師", "前鋒", "盲女", "祭司", "調香師", "牛仔", "舞女", "先知", "入殮師", "勘探員", "咒術師", "野人", "雜技演員", "大副", "調酒師", "郵差", "守墓人", "囚徒", "昆蟲學者", "畫家", "擊球手", "玩具商", "心理學家", "病患", "小說家", "小女孩", "哭泣小丑", "教授", "古董商", "作曲家", "記者", "飛行家", "啦啦隊員", "木偶師", "火災調查員", "法羅女士", "騎士", "氣象學家", "弓箭手", "逃脫大師", "幻燈師", "鬥牛士", "默劇藝人"];
    const allMaps = ["軍工廠", "紅教堂", "聖心醫院", "湖景村", "月亮河公園", "里奧的回憶", "永眠鎮", "唐人街", "不歸林"];

    let allSheetsData = {}; 
    let currentMatchedData = [];
    let currentLang = "中文";
    
    const banSelects = [document.getElementById('ban1'), document.getElementById('ban2'), document.getElementById('ban3')];
    const mapSelect = document.getElementById('map');
    const searchSequence = ['search-ban1', 'search-ban2', 'search-ban3', 'search-map'];

    // --- 輔助翻譯函式 ---
    function t(key) { return uiText[key] && uiText[key][currentLang] ? uiText[key][currentLang] : (uiText[key] ? uiText[key]["中文"] : key); }
    function tName(name) {
        if (!name) return "";
        let cleanName = name.replace("黄", "黃"); 
        if (currentLang === "中文" || !langDict[cleanName]) return cleanName;
        return langDict[cleanName][currentLang] || cleanName;
    }

    // --- 初始化邏輯 ---
    function init() {
        populateDropdowns();
        setupSearchAndHighlight();
        updateUILanguage();
        
        fetch('排位屠夫小本本.xlsx')
            .then(res => { if (!res.ok) throw new Error(); return res.arrayBuffer(); })
            .then(data => {
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetContainer = document.getElementById('sheet-checkboxes');
                sheetContainer.innerHTML = ''; 

                workbook.SheetNames.forEach(sheetName => {
                    if (sheetName.includes('查詢表')) return;
                    
                    // ★ 升級點：加入 raw: false 強制將超連結或特殊格式解析為純文字
                    const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {defval: "", raw: false});
                    allSheetsData[sheetName] = rawData.map(normalizeRow);

                    const label = document.createElement('label');
                    label.className = 'sheet-label';
                    label.innerHTML = `<input type="checkbox" class="sheet-cb" value="${sheetName}" checked> ${sheetName}`;
                    sheetContainer.appendChild(label);
                });
            })
            .catch(error => {
                document.getElementById('sheet-checkboxes').innerHTML = `<span style="color:red;">讀取失敗：請確認檔案是否正確放入資料夾。</span>`;
            });
    }

    // --- 智慧校正資料列 ---
    function normalizeRow(row) {
        let cleanData = { b1: "", b2: "", b3: "", map: "", hunter: "", player: "" };
        for (let key in row) {
            let k = String(key).replace(/\s+/g, '').toLowerCase();
            
            // 防呆：強制將讀取到的內容轉為純字串，並清除所有看不見的零寬度特殊字元
            let cellValue = row[key] ? String(row[key]).replace(/[\u200B-\u200D\uFEFF]/g, '').trim() : "";

            if (/(ban.*1)|(1.*ban)|一/.test(k)) cleanData.b1 = cellValue;
            else if (/(ban.*2)|(2.*ban)|二/.test(k)) cleanData.b2 = cellValue;
            else if (/(ban.*3)|(3.*ban)|三/.test(k)) cleanData.b3 = cellValue;
            else if (k.includes('地圖') || k.includes('map')) cleanData.map = cellValue;
            else if (k.includes('監管') || k.includes('屠夫') || k.includes('hunter')) {
                cleanData.hunter = cellValue.replace("黄", "黃"); 
            }
            // ★ 升級點：擴充所有可能的玩家稱呼，確保絕對不會漏抓
            else if (k.includes('玩家') || k.includes('對手') || k.includes('暱稱') || k.includes('player') || k.includes('id')) {
                cleanData.player = cellValue;
            }
        }
        return cleanData;
    }

    // --- 下拉選單與語言更新邏輯 ---
    function populateDropdowns() {
        allMaps.forEach(m => mapSelect.add(new Option(tName(m), m)));
        banSelects.forEach(select => {
            allSurvivors.forEach(s => select.add(new Option(tName(s), s)));
        });
    }

    function changeLanguage() {
        currentLang = document.getElementById('langSelect').value;
        updateUILanguage();
        updateDropdownTranslations();
        if (currentMatchedData.length > 0) displayResults(currentMatchedData);
    }

    function updateUILanguage() {
        document.title = t("title");
        document.getElementById('ui-title').innerText = t("title");
        document.getElementById('ui-langLabel').innerText = t("langLabel");
        document.getElementById('ui-sheetLabel').innerText = t("sheetLabel");
        
        document.getElementById('lbl-ban1').innerText = t("banLabel") + " 1：";
        document.getElementById('lbl-ban2').innerText = t("banLabel") + " 2：";
        document.getElementById('lbl-ban3').innerText = t("banLabel") + " 3：";
        document.getElementById('lbl-map').innerText = t("mapLabel");
        
        document.getElementById('ui-queryBtn').innerText = t("queryButton");
        document.getElementById('ui-clearBtn').innerText = t("clearButton");
        document.getElementById('ui-copyBtn').innerText = t("copyButton");
        
        document.querySelectorAll('.opt-default').forEach(opt => opt.innerText = t("defaultOption"));
        document.querySelectorAll('.opt-map-optional').forEach(opt => opt.innerText = t("mapOptional"));
        
        document.getElementById('ui-predTitle').innerText = t("predictionTitle");
        document.getElementById('ui-playerTitle').innerText = t("playerTitle");
        document.getElementById('th-player').innerText = t("thPlayer");
        document.getElementById('th-hunter').innerText = t("thHunter");
        document.getElementById('th-map').innerText = t("thMap");
        document.getElementById('th-combo').innerText = t("thCombo");
        document.getElementById('th-source').innerText = t("thSource");
    }

    function updateDropdownTranslations() {
        Array.from(mapSelect.options).forEach(opt => {
            if (opt.value !== "") opt.text = tName(opt.value);
        });
        banSelects.forEach(select => {
            Array.from(select.options).forEach(opt => {
                if (opt.value !== "") opt.text = tName(opt.value);
            });
        });
    }

    function clearSelection() {
        banSelects.forEach(s => { s.value = ""; s.classList.remove("selected-active"); });
        mapSelect.value = ""; mapSelect.classList.remove("selected-active");
        updateBanDropdowns();
        document.getElementById('resultSection').style.display = 'none';
        currentMatchedData = [];
    }

    // --- 搜尋與互動邏輯 ---
    function setupSearchAndHighlight() {
        searchSequence.forEach((inputId, index) => {
            const searchInput = document.getElementById(inputId);
            const selectId = inputId.replace('search-', '');
            const select = document.getElementById(selectId);

            searchInput.addEventListener('input', function() {
                const term = this.value.trim().toLowerCase();
                Array.from(select.options).forEach(opt => {
                    if (opt.value === "") return;
                    opt.style.display = opt.text.toLowerCase().includes(term) ? '' : 'none';
                });
            });

            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const term = this.value.trim().toLowerCase();
                    if (!term) { jumpToNext(index); return; }

                    const options = Array.from(select.options).filter(opt => opt.value !== "" && opt.style.display !== 'none');
                    let matchedOption = options.find(opt => opt.text.toLowerCase() === term) || options.find(opt => opt.text.toLowerCase().includes(term));

                    if (matchedOption && !matchedOption.disabled) {
                        select.value = matchedOption.value;
                        select.dispatchEvent(new Event('change'));
                        jumpToNext(index);
                    }
                }
            });

            select.addEventListener('change', function() {
                this.value !== "" ? this.classList.add("selected-active") : this.classList.remove("selected-active");
                searchInput.value = '';
                Array.from(select.options).forEach(opt => opt.style.display = '');
                if (this.classList.contains('ban-select')) updateBanDropdowns();
            });
        });
    }

    function jumpToNext(currentIndex) {
        if (currentIndex < searchSequence.length - 1) {
            document.getElementById(searchSequence[currentIndex + 1]).focus();
        } else {
            document.getElementById('ui-queryBtn').focus();
            searchData();
        }
    }

    function updateBanDropdowns() {
        const selectedValues = banSelects.map(sel => sel.value).filter(val => val !== "");
        banSelects.forEach(select => {
            const currentValue = select.value;
            Array.from(select.options).forEach(opt => {
                if (opt.value === "") return;
                opt.disabled = selectedValues.includes(opt.value) && opt.value !== currentValue;
            });
        });
    }

    // --- 查詢與結果顯示 ---
    function searchData() {
        const b1 = document.getElementById('ban1').value;
        const b2 = document.getElementById('ban2').value;
        const b3 = document.getElementById('ban3').value;
        const selectedMap = mapSelect.value;

        if (!b1 || !b2 || !b3) {
            alert("請完整選擇 3 個 Ban 位！");
            return;
        }

        let activeDatabase = [];
        const checkedSheets = document.querySelectorAll('.sheet-cb:checked');
        if (checkedSheets.length === 0) return;

        checkedSheets.forEach(cb => {
            const sheetData = allSheetsData[cb.value].map(row => ({ ...row, _sourceSheet: cb.value }));
            activeDatabase = activeDatabase.concat(sheetData);
        });

        const targetBanCombo = [b1, b2, b3].sort().join(',');

        currentMatchedData = activeDatabase.filter(row => {
            const rowBanCombo = [row.b1, row.b2, row.b3].sort().join(',');
            const matchBan = (targetBanCombo === rowBanCombo);
            const matchMap = selectedMap === "" || row.map === selectedMap;
            return matchBan && matchMap;
        });

        displayResults(currentMatchedData);
    }

    function displayResults(data) {
        document.getElementById('resultSection').style.display = 'block';
        const statsBox = document.getElementById('statsBox');
        const tbody = document.getElementById('playerTableBody');
        tbody.innerHTML = '';
        statsBox.innerHTML = '';

        if (data.length === 0) {
            statsBox.innerHTML = `<p style="color:red; font-weight:bold;">${t("noData")}</p>`;
            return;
        }

        const hunterCounts = {};
        data.forEach(row => {
            const hunter = (row.hunter && row.hunter !== "") ? row.hunter : '未知';
            hunterCounts[hunter] = (hunterCounts[hunter] || 0) + 1;
        });

        let statsHtml = '<ul>';
        const sortedHunters = Object.entries(hunterCounts).sort((a, b) => b[1] - a[1]);
        
        for (const [hunter, count] of sortedHunters) {
            const percentage = ((count / data.length) * 100).toFixed(1);
            statsHtml += `<li><strong>${tName(hunter)}</strong> : ${percentage}% (${count} matches)</li>`;
        }
        statsHtml += '</ul>';
        statsBox.innerHTML = statsHtml;

        data.forEach(row => {
            const tr = document.createElement('tr');
            const banComboDisplay = [row.b1, row.b2, row.b3].filter(v => v !== '').map(tName).join(', ');
            
            tr.innerHTML = `
                <td>${row.player || '-'}</td>
                <td style="font-weight:bold; color:#d32f2f;">${tName(row.hunter) || '-'}</td>
                <td>${tName(row.map) || '-'}</td>
                <td>${banComboDisplay}</td>
                <td><span style="background:#eee; padding:2px 6px; border-radius:4px; font-size:12px;">${row._sourceSheet}</span></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // --- 複製預測結果功能 ---
    function copyStats() {
        const statsBox = document.getElementById('statsBox');
        if (!statsBox || statsBox.innerText.includes(t("noData")) || statsBox.innerText === "") return;

        let copyText = t("predictionTitle") + "\n";
        const listItems = statsBox.querySelectorAll('li');
        listItems.forEach(li => {
            copyText += " - " + li.innerText + "\n";
        });

        navigator.clipboard.writeText(copyText).then(() => {
            alert(t("copySuccess"));
        }).catch(err => {
            console.error('Copy failed', err);
        });
    }

    init();
</script>
</body>
</html>
